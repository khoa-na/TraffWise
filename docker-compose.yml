services:
  backend:
    build: ./backend
    ports:
      - "18080:8000"
    environment:
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3200}
    volumes:
      - ./backend/api/data:/app/backend/api/data:ro
      - ./backend/api/data/.easyocr:/root/.EasyOCR
      - ./backend/violations:/app/backend/violations

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3200:3000"
    environment:
      WATCHPACK_POLLING: "true"
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:18080}
